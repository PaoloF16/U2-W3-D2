<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <h1>Register Form JS</h1>
    </header>

    <main>
      <form id="registerForm">
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Name</label>
          <input
            type="text"
            class="form-control"
            id="nameText"
            aria-describedby="emailHelp"
            placeholder="Insert your name"
          />
        </div>
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label ">Last Name</label>
          <input
            type="text"
            class="form-control"
            id="lastNameText"
            aria-describedby="emailHelp"
            placeholder="Insert your last name"
          />
        </div>
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Phone Number</label>
          <input
            type="number"
            class="form-control"
            id="phoneText"
            aria-describedby="emailHelp"
            placeholder="Insert your phone"
          />
        </div>

        <button type="submit" onclick="submitForm()" class="btn btn-primary">Submit</button>
        <button type="button" onclick="loadForm()" class="btn btn-primary">Load</button>
        <button type="button" onclick="deleteForm()" class="btn btn-primary">Delete</button>
      </form>
    </main>

    <footer></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
